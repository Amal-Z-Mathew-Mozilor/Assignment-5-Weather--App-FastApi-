<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Skies — Weather</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0e1a;
    --card: #111827;
    --border: #1e2d45;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --text: #f0f4ff;
    --muted: #64748b;
    --error: #f87171;
    --success: #34d399;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.1; animation: drift 12s ease-in-out infinite alternate; }
  .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; }
  .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; left: -80px; animation-delay: -5s; }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(20px, 15px); } }

  /* Nav */
  nav {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.8);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    padding: 8px 18px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid var(--border);
    background: none;
    color: var(--text);
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
  }
  .nav-btn.primary:hover { opacity: 0.85; }

  /* Main */
  main {
    position: relative; z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 16px;
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .page-subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; font-style: italic; }

  /* Search */
  .search-box {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }
  .search-box input {
    flex: 1;
    padding: 14px 20px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
  }
  .search-box input::placeholder { color: var(--muted); }
  .btn {
    padding: 14px 24px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Weather Card */
  .weather-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    display: none;
    animation: fadeUp 0.4s ease both;
    position: relative;
    overflow: hidden;
  }
  .weather-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(56,189,248,0.12), transparent 70%);
    border-radius: 50%;
  }
  .weather-card.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .weather-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
  }
  .weather-location h2 {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 24px;
  }
  .weather-location p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .weather-emoji { font-size: 52px; line-height: 1; }

  .weather-temp {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 56px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 24px;
  }
  .weather-temp span { font-size: 28px; font-weight: 600; }

  .weather-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .weather-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .weather-stat .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .weather-stat .value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--accent);
  }

  .save-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: none;
    border: 1px solid var(--accent);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:hover { background: var(--accent); color: #fff; }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .message {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-top: 12px;
    display: none;
    animation: fadeUp 0.3s ease;
  }
  .message.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); display: block; }
  .message.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--success); display: block; }

  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    display: none;
    font-style: italic;
  }
  .loading.visible { display: block; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<nav>
  <a class="nav-logo" href="weather.html">🌤️ Skies</a>
  <div class="nav-links">
    <a class="nav-btn primary" href="history.html">My Saved</a>
    <button class="nav-btn" onclick="logout()">Sign Out</button>
  </div>
</nav>

<main>
  <h1 class="page-title">Check Weather</h1>
  <p class="page-subtitle">Search any city and save it to your collection</p>

  <div class="search-box">
    <input type="text" id="cityInput" placeholder="Enter city name..." onkeydown="if(event.key==='Enter') fetchWeather()"/>
    <button class="btn" onclick="fetchWeather()" id="searchBtn">Search</button>
  </div>

  <div class="loading" id="loading">Fetching weather data...</div>
  <div class="message" id="searchMsg"></div>

  <div class="weather-card" id="weatherCard">
    <div class="weather-top">
      <div class="weather-location">
        <h2 id="cityName">—</h2>
        <p id="countryName">—</p>
      </div>
      <div class="weather-emoji" id="weatherEmoji">🌡️</div>
    </div>
    <div class="weather-temp"><span id="tempValue">—</span><span>°C</span></div>
    <div class="weather-grid">
      <div class="weather-stat">
        <div class="label">Feels Like</div>
        <div class="value" id="feelsLike">—°</div>
      </div>
      <div class="weather-stat">
        <div class="label">Humidity</div>
        <div class="value" id="humidity">—%</div>
      </div>
      <div class="weather-stat">
        <div class="label">Wind</div>
        <div class="value" id="wind">— km/h</div>
      </div>
    </div>
    <button class="save-btn" onclick="saveWeather()" id="saveBtn">＋ Save to My Collection</button>
    <div class="message" id="saveMsg"></div>
  </div>
</main>

<script>
  const API = "http://localhost:8000/api";
  let currentWeather = null;

  // Auth guard
  const token = localStorage.getItem('token');
  if (!token) window.location.href = 'index.html';

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
  }

  function getWeatherEmoji(temp) {
    if (temp >= 35) return '🔥';
    if (temp >= 28) return '☀️';
    if (temp >= 20) return '⛅';
    if (temp >= 10) return '🌥️';
    if (temp >= 0)  return '🧥';
    return '❄️';
  }

  function showMsg(id, text, type) {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = `message ${type}`;
  }

  async function fetchWeather() {
    const city = document.getElementById('cityInput').value.trim();
    if (!city) return showMsg('searchMsg', 'Please enter a city name.', 'error');

    document.getElementById('searchBtn').disabled = true;
    document.getElementById('loading').classList.add('visible');
    document.getElementById('weatherCard').classList.remove('visible');
    document.getElementById('searchMsg').className = 'message';

    try {
      const res = await fetch(`${API}/weather/fetch_weather?country=${encodeURIComponent(city)}`);
      const data = await res.json();
      if (!res.ok) return showMsg('searchMsg', data.detail || 'City not found.', 'error');

      currentWeather = data;
      document.getElementById('cityName').textContent = data.city;
      document.getElementById('countryName').textContent = data.country;
      document.getElementById('tempValue').textContent = data.temperature;
      document.getElementById('feelsLike').textContent = `${data.feels_like}°`;
      document.getElementById('humidity').textContent = `${data.humidity}%`;
      document.getElementById('wind').textContent = `${data.wind ?? '—'} km/h`;
      document.getElementById('weatherEmoji').textContent = getWeatherEmoji(data.temperature);
      document.getElementById('saveBtn').disabled = false;
      document.getElementById('saveMsg').className = 'message';
      document.getElementById('weatherCard').classList.add('visible');
    } catch (e) {
      showMsg('searchMsg', 'Could not connect to server.', 'error');
    } finally {
      document.getElementById('searchBtn').disabled = false;
      document.getElementById('loading').classList.remove('visible');
    }
  }

  async function saveWeather() {
    if (!currentWeather) return;
    document.getElementById('saveBtn').disabled = true;

    try {
      const res = await fetch(`${API}/weather/save`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify(currentWeather)
      });
      const data = await res.json();
      if (!res.ok) {
        if (res.status === 401) { localStorage.removeItem('token'); window.location.href = 'index.html'; return; }
        return showMsg('saveMsg', data.detail || 'Could not save.', 'error');
      }
      showMsg('saveMsg', '✓ Saved to your collection!', 'success');
    } catch (e) {
      showMsg('saveMsg', 'Could not connect to server.', 'error');
    } finally {
      document.getElementById('saveBtn').disabled = false;
    }
  }
</script>
</body>
</html>
